services:
  puma_ollama:
    image: ollama/ollama:latest
    container_name: puma_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    networks:
      - puma_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              capabilities: [gpu]
              device_ids:
                - nvidia.com/gpu=all
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  puma_runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puma_runner
    volumes:
      - .:/app
      - puma_data:/app/data
    environment:
      - OLLAMA_HOST=http://puma_ollama:11434
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - PUMA_GPU_NAME=${PUMA_GPU_NAME:-}
      - PUMA_GPU_VRAM_GB=${PUMA_GPU_VRAM_GB:-}
      - PUMA_GPU_BACKEND=${PUMA_GPU_BACKEND:-}
    depends_on:
      puma_ollama:
        condition: service_healthy
    networks:
      - puma_network
    command: tail -f /dev/null

  puma_dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: puma_dashboard
    volumes:
      - .:/app
      - puma_data:/app/data
    environment:
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1
      - PUMA_GPU_NAME=${PUMA_GPU_NAME:-}
      - PUMA_GPU_VRAM_GB=${PUMA_GPU_VRAM_GB:-}
      - PUMA_GPU_BACKEND=${PUMA_GPU_BACKEND:-}
    ports:
      - "8501:8501"
    networks:
      - puma_network
    command: >
      streamlit run src/puma/dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

volumes:
  ollama_models:
  puma_data:

networks:
  puma_network:
    driver: bridge
    name: puma_network
